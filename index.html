<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMS Monitoring Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Gaya dasar untuk memastikan aplikasi tampil proporsional di semua perangkat */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: #f8fafc; height: 100vh; display: flex; align-items: center; justify-content: center; }
        
        /* Container utama yang dinamis */
        #app-container { width: 100%; max-width: 400px; padding: 20px; }
        
        /* Area Login Page */
        #login-screen { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="app-container">
        <div id="login-screen">
            <h2 style="text-align: center; margin-bottom: 20px;">Login</h2>
            <input type="text" id="email" placeholder="Email" style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid #ccc;">
            <input type="password" id="password" placeholder="Password" style="width:100%; padding:10px; margin-bottom:20px; border-radius:8px; border:1px solid #ccc;">
            <button id="btn-login" style="width:100%; padding:10px; background:#2563eb; color:white; border:none; border-radius:8px; cursor:pointer;">Masuk</button>
        </div>

        <div id="dashboard-screen" class="hidden">
            <h1>Selamat Datang di Dashboard</h1>
            <button id="btn-logout">Logout</button>
        </div>
    </div>

    <script>
        // Inisialisasi Supabase
        const SUPABASE_URL = 'https://uogkyucwbaofwbcrcpvf.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_QunitsAo75z0AcQL0X6ygQ_KmNznscd';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Logika Login Sederhana
        document.getElementById('btn-login').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const { data, error } = await supabase.auth.signInWithPassword({ email, password });

            if (error) {
                alert('Login Gagal: ' + error.message);
            } else {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('dashboard-screen').classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
