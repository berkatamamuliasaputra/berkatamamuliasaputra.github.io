<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BMS Monitoring Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* Reset & Layout */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: #f1f5f9; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        /* Login Card */
        #login-screen { background: #fff; padding: 30px; border-radius: 16px; width: 340px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15); }
        .field-input { width: 100%; height: 40px; margin: 10px 0; padding: 0 12px; border: 1.5px solid #e2e8f0; border-radius: 8px; outline: none; }
        .field-input:focus { border-color: #2563eb; }
        .btn-login { width: 100%; height: 40px; background: #2563eb; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        
        /* Dashboard Container */
        #dashboard-screen { width: 100%; height: 100%; padding: 20px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2 style="margin-bottom: 20px; text-align: center;">Login</h2>
        <input type="email" id="email" class="field-input" placeholder="Email">
        <input type="password" id="password" class="field-input" placeholder="Password">
        <button id="btn-login" class="btn-login">Masuk</button>
    </div>

    <div id="dashboard-screen" class="hidden">
        <div id="content-area">
            <h1>Dashboard Monitoring</h1>
            <p>Data dari Supabase akan tampil di sini.</p>
            <button onclick="logout()">Keluar</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://uogkyucwbaofwbcrcpvf.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_QunitsAo75z0AcQL0X6ygQ_KmNznscd';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Fungsi Login
        document.getElementById('btn-login').onclick = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await supabase.auth.signInWithPassword({ email, password });
            
            if (error) {
                alert('Login Gagal: ' + error.message);
            } else {
                showDashboard();
            }
        };

        function showDashboard() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard-screen').classList.remove('hidden');
        }

        function logout() {
            location.reload(); // Sederhana: reload untuk logout
        }
    </script>
</body>
</html>
