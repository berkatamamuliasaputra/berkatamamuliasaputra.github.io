// ─── Helpers ──────────────────────────────────────────────────────────────────
function v(x){ return (x===null||x===undefined||x==='') ? '—' : x; }
// ─── Konversi link Google Drive (view) menjadi link download langsung ─────────
function toDownloadUrl(url){
  if(!url) return url;
  var m = String(url).match(/drive\.google\.com\/file\/d\/([^/]+)/);
  if(m && m[1]) return 'https://drive.google.com/uc?export=download&id=' + m[1];
  var m2 = String(url).match(/[?&]id=([^&]+)/);
  if(m2 && m2[1] && /drive\.google\.com/.test(url)) return 'https://drive.google.com/uc?export=download&id=' + m2[1];
  return url; // bukan link Drive yang dikenali -> biarkan apa adanya
}
function fmtDate(x){ if(!x) return '—'; try{ var d=new Date(x); return isNaN(d)?x:d.toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'}); }catch(e){return x;} }
function badge(s){ if(!s) return '—'; var l=s.toLowerCase(); var c='bdg-def'; if(/paid|completed|approved|lunas|done|selesai/.test(l))c='bdg-ok'; else if(/pending|process|proses|progress|review/.test(l))c='bdg-warn'; else if(/cancel|reject|batal|fail|gagal/.test(l))c='bdg-err'; return '<span class="bdg '+c+'">'+s+'</span>'; }
function cellLink(val){ if(!val) return '—'; if(/^https?:\/\//i.test(String(val))) return '<a href="'+val+'" target="_blank" class="cell-link"><i class="fas fa-external-link-alt"></i>Lihat</a>'; return v(val); }

// ─── Parser angka yang aman untuk format Indonesia (titik ribuan, koma desimal) ──
// Menangani semua kemungkinan bentuk data dari Sheet:
//   510600          -> number murni dari hasil hitung sistem
//   "510600"        -> string angka polos
//   "510.600"       -> teks format ID dengan titik sebagai pemisah RIBUAN (bukan desimal!)
//   "510.600,75"    -> teks format ID lengkap dengan desimal pakai koma
//   "Rp 510.600"    -> ada prefix mata uang / spasi
//   510600.75       -> number JS asli yang sudah punya desimal asli (format US)
function parseIDNumber(x){
  if(x===null||x===undefined||x==='') return 0;
  if(typeof x==='number') return x; // sudah number asli dari getValues(), jangan diutak-atik
  var s = String(x).trim();
  if(s==='') return 0;
  s = s.replace(/[^0-9.,\-]/g,''); // buang "Rp", spasi, dll — sisakan digit, titik, koma, minus
  if(s==='' || s==='-') return 0;

  var hasDot = s.indexOf('.') > -1;
  var hasComma = s.indexOf(',') > -1;

  if(hasDot && hasComma){
    // Format ID lengkap: titik = ribuan, koma = desimal -> "510.600,75"
    s = s.replace(/\./g,'').replace(',', '.');
  } else if(hasComma && !hasDot){
    // Hanya koma -> desimal ala ID: "510600,75"
    s = s.replace(',', '.');
  } else if(hasDot && !hasComma){
    // Hanya titik. Ini yang rawan salah: bisa ribuan ("510.600") atau desimal ("510.6").
    // Heuristik: kalau ada lebih dari satu titik, pasti pemisah ribuan -> buang semua titik.
    // Kalau cuma satu titik, dan diikuti PERSIS 3 digit di akhir (bukan 1-2), anggap ribuan.
    var dotCount = (s.match(/\./g)||[]).length;
    if(dotCount > 1){
      s = s.replace(/\./g,'');
    } else {
      var afterDot = s.split('.')[1]||'';
      if(afterDot.length===3){
        s = s.replace(/\./g,''); // "510.600" -> ribuan
      }
      // selain itu (1-2 digit di belakang titik) dibiarkan sebagai desimal asli, mis. "12.5"
    }
  }
  var n = parseFloat(s);
  return isNaN(n) ? 0 : n;
}
// ─── Format angka menjadi Rupiah ──────────────────────────────────────────────
function fmtRp(x){
  if(x===null||x===undefined||x==='') return '—';
  var n = parseIDNumber(x);
  return 'Rp\u00A0'+new Intl.NumberFormat('id-ID',{minimumFractionDigits:0,maximumFractionDigits:0}).format(Math.round(n));
}
// Format profit sebagai persentase: (Total Jual - Total Beli) / Total Beli * 100
function fmtPct(profitVal, totalBeli, hargaJual){
  // Rumus: (Harga Jual - Harga Beli) / Harga Jual * 100
  var jual = parseIDNumber(hargaJual);
  var beli = parseIDNumber(totalBeli);
  var pct;
  if(jual !== 0){
    pct = ((jual - beli) / jual) * 100;
  } else {
    // fallback: coba baca nilai profitVal langsung
    var raw = parseIDNumber(profitVal);
    pct = raw;
  }
  var sign  = pct >= 0 ? '+' : '';
  var cls   = pct >= 0 ? 'profit-pos' : 'profit-neg';
  var fixed = Math.abs(pct) >= 100 ? pct.toFixed(1) : pct.toFixed(2);
  return '<span class="profit-badge '+cls+'"><i class="fas fa-'+(pct>=0?'arrow-up':'arrow-down')+'" style="font-size:8px"></i>'+sign+fixed+'%</span>';
}
function showToast(msg,type){ var t=document.getElementById('toast'); var el=document.createElement('div'); el.className='toast-item '+(type||'success'); var icon=type==='error'?'fa-circle-xmark':(type==='info'?'fa-circle-info':'fa-circle-check'); el.innerHTML='<i class="fas '+icon+'"></i> '+msg; t.appendChild(el); setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el);},type==='info'?6000:3500); }

function initApp(){
  applyTheme();

  loadNotifications();
  startAutoRefresh();

    if(localStorage.getItem('sb_mini')==='1'){
      var sb=document.getElementById('sidebar');
      if(sb){ sb.classList.add('mini'); _sbMini=true; }
    }
  }catch(e){}
  var s=null;
  try{ s=localStorage.getItem('pms_user'); }catch(e){ s=null; }
  if(s){
    try{
      var user=JSON.parse(s);
      if(user&&user.username){
        currentUser=user;
        showApp();
        // Render dari cache dulu (instan), lalu refresh server di background
        loadSection('dashboard');
        // Preload semua seksi di background dengan stagger
        setTimeout(preloadAllSections, 800);
        loadNewsTicker();
        return;
      }
    }catch(e){}
  }
  showLogin();
}

// ─── Login ────────────────────────────────────────────────────────────────────
function doLogin(e){
  e.preventDefault();
  var u=document.getElementById('l-user').value.trim();
  var p=document.getElementById('l-pass').value;
  if(!u||!p){ showLoginErr('Isi username dan password.'); return; }
  hideLoginErr();
  setLoginLoading(true);
  google.script.run
    .withSuccessHandler(onLoginResult)
    .withFailureHandler(function(err){ setLoginLoading(false); showLoginErr(err.message||'Koneksi gagal.'); })
    .login(u, p);
}
 
function onLoginResult(r){
  setLoginLoading(false);
  if(!r){ showLoginErr('Tidak ada respons dari server.'); return; }
  if(r.success && r.user){
    try { localStorage.setItem('pms_user', JSON.stringify(r.user)); } catch(e){}
    currentUser = r.user;
    showApp();
    loadSection('dashboard');
  } else {
    showLoginErr(r.error || 'Login gagal.');
  }
}
 
// PERBAIKAN: setLoginLoading tidak lagi pakai Bootstrap d-none, tapi class .hidden custom

  document.getElementById('login-btn').disabled = on;

    document.getElementById('login-sp').classList.remove('hidden');
  } else {
    document.getElementById('login-sp').classList.add('hidden');
  }
}
 
function showLoginErr(msg){
  var el=document.getElementById('login-err');
  el.textContent=msg;
  el.style.display='block';
}
 
function hideLoginErr(){

// ─── Navigation ───────────────────────────────────────────────────────────────
function nav(sec,el){
  document.querySelectorAll('.sb-link').forEach(function(a){a.classList.remove('active');});
  el.classList.add('active');
  document.querySelectorAll('.section').forEach(function(s){s.classList.remove('active');});
  var targetSec = document.getElementById('sec-'+sec);
  if(targetSec){
    // Reset animasi supaya sectionFadeIn re-trigger setiap kali berpindah section
    targetSec.style.animation='none';
    void targetSec.offsetWidth; // force reflow
    targetSec.style.animation='';
    targetSec.classList.add('active');
  }
  currentSection=sec;
  if(sec==='account'){ openAccountSection(); return; }
  if(sec==='admin-bms'){ openAdminBmsSection(); return; }
  if(sec==='extra'){ renderMediaPresets(); return; }
  if(sec==='dashboard'){
    loadNewsTicker();
    refreshDashboardCounts();
    // Jika dashboard stale, reload dari server
    var dc=cacheGet('dashboard');
    if(!dc||dc._stale) loadSection('dashboard');
    return;
  }
  // Jika sudah ada di store (dari preload/cache), render langsung tanpa spinner
  if(store[sec]&&store[sec].length>=0){
    renderSection(sec,'');
    // Cek apakah perlu refresh dari server (stale)
    var cached=cacheGet(sec);
    if(!cached||cached._stale){ loadSection(sec); }
  } else {
    loadSection(sec);
  }
}
 
// ─── Data loading ─────────────────────────────────────────────────────────────
// (Implementasi loadSection() yang dipakai ada di bagian "Cache-first / Stale-While-Revalidate"
// di bawah — lihat fungsi loadSection, reloadSection, refreshAll versi lengkap)
function onData(sec,r){
  if(sec==='dashboard'){ renderDashboard(r); return; }
  if(r && r.success){
    store[sec]=r.data;
    renderSection(sec);
    var infoEl=document.getElementById('info-'+sec);
    if(infoEl) infoEl.textContent=r.data.length+' total records';
  } else {
    showToast((r&&r.error)||'Gagal memuat '+sec,'error');
  }
}
 
function filterSec(sec){
  if(!store[sec]) return;
  var q=(document.getElementById('q-'+sec)||{}).value||'';
  renderSection(sec,q.toLowerCase());
}
 
// ─── Dashboard render ─────────────────────────────────────────────────────────
function renderDashboard(d){
  if(!d||!d.success){
    document.getElementById('stats-grid').innerHTML='<div class="col-12" style="padding:16px;color:var(--red)">Error: '+(d&&d.error?d.error:'Gagal memuat data')+'</div>';
    return;
  }
  var c=d.counts||{};

  // ── Data dari store (lebih akurat dari server counts) ──────────────────────
  var prData  = (store['purchase-requests']||[]).filter(function(r){return r['ID Request'];});
  var poData  = (store['purchase-orders']||[]).filter(function(r){return r['ID Order'];});
  var qtData  = (store['quotations']||[]).filter(function(r){return r['ID Quotation'];});
  var invData = (store['invoices']||[]).filter(function(r){return r['ID Invoice'];});
  var supData = store['suppliers']||[];

  var prCount  = prData.length  || c.purchaseRequests||0;
  var poCount  = poData.length  || c.purchaseOrders||0;
  var qtCount  = qtData.length  || c.quotations||0;
  var invCount = invData.length || c.invoices||0;

  _arPrevCounts['purchase-requests']=_arPrevCounts['purchase-requests']||prCount;
  _arPrevCounts['purchase-orders']  =_arPrevCounts['purchase-orders']||poCount;
  _arPrevCounts['quotations']       =_arPrevCounts['quotations']||qtCount;
  _arPrevCounts['invoices']         =_arPrevCounts['invoices']||invCount;

  // ── Helper parse Rupiah ────────────────────────────────────────────────────
  function parseRp(v){ return parseIDNumber(v); }

  // ── Kalkulasi nilai total Rupiah ───────────────────────────────────────────
  var totalNilaiPR  = prData.reduce(function(s,r){  return s+parseRp(r['Total Harga Jual']||r['Total Jual']||r['Total Beli']); },0);
  var totalNilaiPO  = poData.reduce(function(s,r){  return s+parseRp(r['Total Jual']||r['Harga Jual']||r['Total Beli']); },0);
  var totalNilaiQT  = qtData.reduce(function(s,r){  return s+parseRp(r['Grand Total + (PPN 11%)']||r['Grand Total']||r['Total Harga']); },0);
  var totalNilaiINV = invData.reduce(function(s,r){ return s+parseRp(r['Nominal Tagihan']||r['Total']); },0);
  var totalQty      = poData.reduce(function(s,r){  return s+parseIDNumber(r['Qty']); },0);

  // ── Vendor unik ────────────────────────────────────────────────────────────
  var vendorSet={};
  supData.forEach(function(r){ var n=r['Nama Perusahaan Vendor/Supplier']||r['Nama Vendor']; if(n) vendorSet[n]=1; });
  poData.forEach(function(r){  var n=r['Vendor/Supplier']||r['Vendor'];  if(n) vendorSet[n]=1; });
  var totalVendor=Object.keys(vendorSet).length||supData.length||0;

  // ── STAT CARDS ROW 1 ──────────────────────────────────────────────────────
  var colorMap={blue:'var(--blue)',green:'var(--green)',orange:'var(--orange)',purple:'var(--purple)',cyan:'#0891b2'};
  var bgMap={blue:'var(--blue-light)',green:'var(--green-light)',orange:'var(--orange-light)',purple:'var(--purple-light)',cyan:'#cffafe'};
  var cards=[

    {ic:'green',  icn:'fa-shopping-cart',  l:'Purchase Order',   val:poCount,    nav:'purchase-orders'},

    {ic:'purple', icn:'fa-building',       l:'Total Vendor',     val:totalVendor,nav:'suppliers'}

  document.getElementById('stats-grid').innerHTML=cards.map(function(cd){

    return '<div class="col-lg-3 col-sm-6"><div class="stat-card stat-card-clickable '+accCls+'" onclick="navToSec(\''+cd.nav+'\')" style="cursor:pointer;background:#fff;padding:16px 18px">'

  // ── DONUT CHART ────────────────────────────────────────────────────────────
  setTimeout(function(){
    var canvas=document.getElementById('donut-chart');
    if(!canvas) return;
    var ctx=canvas.getContext('2d');
    var W=180,H=180,cx=W/2,cy=H/2,R=72,r=44;

    var startAngle=-Math.PI/2;
    vals.forEach(function(val,i){
      var sweep=(val/total)*Math.PI*2;
      ctx.beginPath();
      ctx.moveTo(cx,cy);
      ctx.arc(cx,cy,R,startAngle,startAngle+sweep);
      ctx.closePath();
      ctx.fillStyle=colors[i];
      ctx.fill();
      startAngle+=sweep;

    // Inner hole
    ctx.beginPath();
    ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.fillStyle='#fff';
    ctx.fill();

  var custMap={};

  custArr.sort(function(a,b){return b.total-a.total;});

  var tcEl=document.getElementById('top-customers');

    if(topCust.length===0){ tcEl.innerHTML='<div class="empty-state" style="padding:24px">Belum ada data PO</div>'; }

      tcEl.innerHTML='<div style="padding:6px 14px">'+topCust.map(function(c,i){

          +'<div style="height:100%;width:'+pct+'%;background:'+colors2[i%colors2.length]+';border-radius:3px;transition:width .6s ease"></div>'
          +'</div></div>';
      }).join('')+'</div>';
    }
  }

  // ── STATUS QUOTATION BREAKDOWN ─────────────────────────────────────────────
  var statusMap={};
  qtData.forEach(function(r){
    var s=r['Status']||'Tidak ada status';
    statusMap[s]=(statusMap[s]||0)+1;
  });
  var statusArr=Object.keys(statusMap).map(function(s){return {status:s,count:statusMap[s]};});
  statusArr.sort(function(a,b){return b.count-a.count;});
  var sbEl=document.getElementById('status-breakdown');
  if(sbEl){
    if(statusArr.length===0){ sbEl.innerHTML='<div class="empty-state" style="padding:24px">Belum ada data Quotation</div>'; }
    else{
      var stColors={'QUOTATION':'#2563eb','INQ PO':'#16a34a','CANCEL':'#dc2626','SELESAI':'#7c3aed','PENDING':'#f59e0b'};
      sbEl.innerHTML='<div style="padding:6px 14px">'+statusArr.map(function(s){
        var col=stColors[s.status]||'#64748b';
        var pct=Math.round((s.count/qtCount)*100)||0;
        return '<div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid #f1f5f9">'
          +'<div style="width:10px;height:10px;border-radius:2px;background:'+col+';flex-shrink:0"></div>'
          +'<div style="flex:1;font-size:12px;font-weight:600;color:#0f172a">'+s.status+'</div>'
          +'<div style="font-size:11px;font-weight:700;color:'+col+'">'+s.count+'</div>'
          +'<div style="font-size:10px;color:#94a3b8;width:32px;text-align:right">'+pct+'%</div>'
          +'</div>';
      }).join('')+'</div>';
    }
  }

  // ── RECENT PURCHASE ORDERS (dari store) ───────────────────────────────────
  var poSorted=poData.slice().sort(function(a,b){
    var da=new Date(a['Tanggal']||0),db=new Date(b['Tanggal']||0);
    return db-da||String(b['ID Order']||'').localeCompare(String(a['ID Order']||''));
  }).slice(0,8);
  var roEl=document.getElementById('recent-orders');
  if(roEl){
    if(poSorted.length===0){ roEl.innerHTML=emptyRow(5); }
    else{
      roEl.innerHTML='<table class="tbl" style="font-size:12px"><thead><tr>'
        +'<th>ID Order</th><th>Tanggal</th><th>Customer</th><th style="min-width:130px">Item</th>'
        +'<th style="text-align:right">Total Jual</th><th>No. PO</th></tr></thead><tbody>'
        +poSorted.map(function(o){
          return '<tr onclick="navToSec(\'purchase-orders\')" style="cursor:pointer">'
            +'<td style="color:var(--blue);font-weight:700;font-size:11px;white-space:nowrap">'+v(o['ID Order'])+'</td>'
            +'<td style="color:#64748b;font-size:11px;white-space:nowrap">'+fmtDate(o['Tanggal'])+'</td>'
            +'<td style="max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500" title="'+v(o['Nama Customer']||o['Customer'])+'">'+v(o['Nama Customer']||o['Customer'])+'</td>'
            +'<td style="max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+v(o['Nama Item'])+'">'+v(o['Nama Item'])+'</td>'
            +'<td style="text-align:right;white-space:nowrap;font-weight:600;color:#059669">'+fmtRp(o['Total Jual']||o['Harga Jual']||o['Total Beli'])+'</td>'
            +'<td style="font-size:11px;color:#64748b;white-space:nowrap">'+v(o['No PO']||o['No. PO'])+'</td></tr>';
        }).join('')+'</tbody></table>';
    }
  }

  // ── RECENT PURCHASE REQUESTS ───────────────────────────────────────────────
  var prSorted=prData.slice().sort(function(a,b){
    var da=new Date(a['Tanggal']||0),db=new Date(b['Tanggal']||0);
    return db-da||String(b['ID Request']||'').localeCompare(String(a['ID Request']||''));
  }).slice(0,8);
  var prEl=document.getElementById('recent-pr');
  if(prEl){
    if(prSorted.length===0){ prEl.innerHTML=emptyRow(5); }
    else{
      prEl.innerHTML='<table class="tbl" style="font-size:12px"><thead><tr>'
        +'<th>ID</th><th>Tanggal</th><th>Customer</th><th style="min-width:130px">Item</th>'
        +'<th style="text-align:right">Total Jual</th><th style="text-align:center">PMT</th></tr></thead><tbody>'
        +prSorted.map(function(o){
          var pmtBg=o['PMT Mode']==='KREDIT'?'background:#fee2e2;color:#dc2626':'background:#fef3c7;color:#92400e';
          return '<tr onclick="navToSec(\'purchase-requests\')" style="cursor:pointer">'
            +'<td style="color:#f59e0b;font-weight:700;font-size:11px;white-space:nowrap">'+v(o['ID Request'])+'</td>'
            +'<td style="color:#64748b;font-size:11px;white-space:nowrap">'+fmtDate(o['Tanggal'])+'</td>'
            +'<td style="max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500" title="'+v(o['Nama Customer'])+'">'+v(o['Nama Customer'])+'</td>'
            +'<td style="max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+v(o['Nama Item'])+'">'+v(o['Nama Item'])+'</td>'
            +'<td style="text-align:right;white-space:nowrap;font-weight:600;color:#059669">'+fmtRp(o['Total Harga Jual']||o['Total Jual']||o['Total Beli'])+'</td>'
            +'<td style="text-align:center"><span style="font-size:10px;'+pmtBg+';padding:2px 7px;border-radius:10px">'+v(o['PMT Mode'])+'</span></td></tr>';
        }).join('')+'</tbody></table>';
    }
  }

  // ── RECENT QUOTATIONS ──────────────────────────────────────────────────────
  var qtSorted=qtData.slice().sort(function(a,b){
    var da=new Date(a['Tanggal']||0),db=new Date(b['Tanggal']||0);
    return db-da||String(b['ID Quotation']||'').localeCompare(String(a['ID Quotation']||''));
  }).slice(0,8);
  var qtEl=document.getElementById('recent-quotations');
  if(qtEl){
    if(qtSorted.length===0){ qtEl.innerHTML=emptyRow(5); }
    else{
      qtEl.innerHTML='<table class="tbl" style="font-size:12px"><thead><tr>'

// ─── Section table renderers ──────────────────────────────────────────────────
function renderSection(sec,q){
  var data=filterData(store[sec]||[],q);
  var tb=document.getElementById('tb-'+sec);
  if(!tb) return;
  if(data.length===0){ tb.innerHTML=emptyRow(20,q?'Tidak ada hasil pencarian':'Belum ada data'); return; }
  tb.innerHTML=data.map(function(r){ return renderRow(sec,r); }).join('');
}
 
function renderRow(sec,r){
  var ri=r._rowIndex||0;
  var trClick=' onclick="openDetailDrawer(\''+sec+'\',(store[\''+sec+'\']||[]).find(function(x){return x._rowIndex==='+ri+';})||{_rowIndex:'+ri+'},'+ri+')"';
  if(sec==='purchase-requests'){
    // Sheet: ID Request | Tanggal | Nama Customer | Nama Item | Qty | Uom | Spesifikasi |
    //        Harga Beli | Total Harga Beli | Harga Jual | Total Harga Jual | PPN 11% | PPN 12% |
    //        DPP+(PPN 11%) | Online Shop Link | PMT Mode | File
    return '<tr'+trClick+'>'+
      '<td style="color:var(--blue);font-weight:600;font-size:12px">'+v(r['ID Request'])+'</td>'+
      '<td style="white-space:nowrap">'+fmtDate(r['Tanggal'])+'</td>'+
      '<td>'+v(r['Nama Customer'])+'</td>'+
      '<td style="min-width:200px;max-width:280px;white-space:normal;word-break:break-word;line-height:1.4">'+v(r['Nama Item'])+'</td>'+
      '<td style="text-align:center;width:52px">'+v(r['Qty'])+'</td>'+
      '<td>'+v(r['Uom'])+'</td>'+
      '<td style="text-align:right;white-space:nowrap">'+fmtRp(r['Harga Beli'])+'</td>'+
      '<td style="text-align:right;white-space:nowrap">'+fmtRp(r['Total Harga Beli'])+'</td>'+
      '<td style="text-align:right;white-space:nowrap">'+fmtRp(r['Harga Jual'])+'</td>'+
      '<td style="text-align:right;white-space:nowrap">'+fmtRp(r['Total Harga Jual'])+'</td>'+
      '<td>'+v(r['PMT Mode'])+'</td>'+
      '<td>'+cellLink(r['Online Shop Link'])+'</td>'+
      '<td>'+cellLink(r['File'])+'</td>'+
      '<td onclick="event.stopPropagation()">'+actBtns(sec,r,ri)+'</td>'+
    '</tr>';
  }
  if(sec==='purchase-orders'){
    // Sheet: ID Order | Tanggal | No PO | Nama Customer | Nama Item | Qty | Uom |
    //        Vendor/Supplier | Harga Beli | Total Beli | Link(nota) | Harga Jual | Profit |
    //        Total Jual | PPN 11% | PPN 12% | DPP PPH | Grand Total+(DPP+PPN11%) |
    //        Tgl Kirim | Nomor Surat Jalan | File PO | Link Pembelian | Link
    return '<tr'+trClick+'>'+
      '<td style="color:var(--blue);font-weight:600;font-size:12px">'+v(r['ID Order'])+'</td>'+
      '<td style="white-space:nowrap">'+fmtDate(r['Tanggal'])+'</td>'+
      '<td>'+v(r['No PO'])+'</td>'+
      '<td>'+v(r['Nama Customer'])+'</td>'+
      '<td style="min-width:200px;max-width:280px;white-space:normal;word-break:break-word;line-height:1.4">'+v(r['Nama Item'])+'</td>'+
      '<td style="text-align:center;width:52px">'+v(r['Qty'])+'</td>'+
      '<td>'+v(r['Uom'])+'</td>'+

function renderDDField(f, r){
  var val = r[f.k];
  if(val===null||val===undefined||val==='') return '';
  var fmt = f.fmt||'text';
  var html = '<div class="dd-row"><span class="dd-label">'+f.lbl+'</span>';
  if(fmt==='rp'){
    var cls = f.big ? 'dd-val money-big' : 'dd-val money';
    html += '<span class="'+cls+'">'+fmtRp(val)+'</span>';
  } else if(fmt==='profit'||fmt==='pct'){
    var totalBeli = r['Total Beli']||r['Total Harga Beli']||'0';
    var totalJual = r['Total Jual']||r['Harga Jual']||'0';
    html += '<span class="dd-val">'+fmtPct(val, totalBeli, totalJual)+'</span>';
  } else if(fmt==='date'){
    html += '<span class="dd-val">'+fmtDate(val)+'</span>';
  } else if(fmt==='link'){
    if(val && val!=='—'){
      html += '<span class="dd-val"><a href="'+val+'" target="_blank"><i class="fas fa-external-link-alt"></i> Lihat File</a></span>';
    } else { return ''; }
  } else if(fmt==='badge'){
    html += '<span class="dd-val">'+badge(val)+'</span>';
  } else {
    html += '<span class="dd-val">'+v(val)+'</span>';
  }
  html += '</div>';
  return html;
}

// ── Cetak PDF dari record yang sudah tersimpan ──────────────────────────────
function invCetakFromRecord(r){
  if(!r){ showToast('Data tidak tersedia','error'); return; }
  // Rekonstruksi data invoice dari record yang tersimpan
  var parsedItems = [];
  try{ parsedItems = JSON.parse(r['Items']||r['items']||'[]'); }catch(e){}
  if(!parsedItems.length){
    // Fallback: buat 1 item dari Invoice Title
    parsedItems = [{id:1, namaBarang:r['Invoice Title']||r['Invoice title']||'',
      qty:1, unit:'', hargaSatuan:parseIDNumber(r['Harga Jual']||0)}];
  }
  var data = {
    tipe:          r['Tipe Invoice']||'TEMPO',
    noFaktur:      r['ID Invoice']||'',
    tanggal:       r['Tanggal Invoice']||'',
    noPO:          r['Nomer PO']||r['No PO']||'',
    fakturPajak:   r['Nomor Faktur Pajak']||'',
    term:          r['Term of Payment']||'',
    jatuhTempo:    r['Jatuh Tempo']||'',
    namaPerusahaan:r['Nama Perusahaan']||r['Nama Customer']||'',
    alamat:        r['Alamat']||'',
    npwp:          r['NPWP']||'',
    keterangan:    r['Keterangan']||'',
    items:         parsedItems,
    hargaJual:     parseIDNumber(r['Harga Jual']||0),
    potongan:      parseIDNumber(r['Potongan Harga']||0),
    uangMuka:      parseIDNumber(r['Uang Muka']||0),
    dpp:           parseIDNumber(r['DPP']||0),
    ppn:           parseIDNumber(r['PPN 12%']||0),
    total:         parseIDNumber(r['Nominal Tagihan']||0)
  };
  exportInvoiceHTMLPDF(data);
}

function actBtns(sec,r,ri){
  var fileUrl='';

  if(cfg){ cfg.fields.forEach(function(f){ if(f.type==='file'&&r[f.k]&&/^https?:\/\//i.test(String(r[f.k]))) fileUrl=r[f.k]; }); }
  // Tombol Cetak PDF khusus untuk invoice
  var cetakBtn = sec==='invoices'
    ? '<button class="btn-act view" style="color:#059669;border-color:#86efac" onclick="invCetakFromRecord((store[\'invoices\']||[]).find(function(x){return x._rowIndex=='+ri+'}))"><i class="fas fa-print"></i>PDF</button> '
    : '';
  return cetakBtn+
    (fileUrl?'<button class="btn-act view" onclick="window.open(\''+toDownloadUrl(fileUrl)+'\',\'_blank\')"><i class="fas fa-download"></i>Unduh</button> ':'')+
    '<button class="btn-act edit" onclick="openEdit(\''+sec+'\','+ri+')"><i class="fas fa-pencil"></i>Edit</button> '+
    '<button class="btn-act del" onclick="openDelete(\''+sec+'\','+ri+')"><i class="fas fa-trash"></i>Hapus</button>';
}

// ─── PPN Auto-Calculation ─────────────────────────────────────────────────────
function getFFVal(key){ var id='ff-'+key.replace(/[^a-zA-Z0-9]/g,'-'); var el=document.getElementById(id); return el?el.value:''; }
function setFFVal(key,val){ var id='ff-'+key.replace(/[^a-zA-Z0-9]/g,'-'); var el=document.getElementById(id); if(el) el.value=val; }
 
function onPpnChange(sec){
  var qty=parseNum(getFFVal('Qty'));
  if(sec==='purchase-requests'){
    var hB=parseNum(getFFVal('Harga Beli')), hJ=parseNum(getFFVal('Harga Jual'));
    var tB=qty*hB, tJ=qty*hJ, p11=tJ*.11, p12=tJ*.12;
    setFFVal('Total Harga Beli', tB>0?Math.round(tB):'');
    setFFVal('Total Harga Jual', tJ>0?Math.round(tJ):'');
    setFFVal('PPN 11%', p11>0?Math.round(p11):'');
    setFFVal('PPN 12%', p12>0?Math.round(p12):'');
    setFFVal('DPP + (PPN 11%)', tJ>0?Math.round(tJ+p11):'');
  } else if(sec==='purchase-orders'){
    var hB=parseNum(getFFVal('Harga Beli')), hJ=parseNum(getFFVal('Harga Jual'));
    var tB=qty*hB, tJ=qty*hJ, pr=tJ-tB, p11=tJ*.11, p12=tJ*.12;
    var prPct = (tB!==0) ? ((pr/tB)*100) : 0;
    setFFVal('Total Beli', tB>0?Math.round(tB):'');
    setFFVal('Total Jual', tJ>0?Math.round(tJ):'');
    setFFVal('Profit', (tJ!==0||tB!==0)?parseFloat(prPct.toFixed(2)):'' );
    setFFVal('PPN 11%', p11>0?Math.round(p11):'');
    setFFVal('PPN 12%', p12>0?Math.round(p12):'');
    setFFVal('DPP PPH', tJ>0?Math.round(tJ):'');
    setFFVal('Grand Total + (DPP + PPN11%)', tJ>0?Math.round(tJ+p11):'');
  } else if(sec==='quotations'){
    var hr=parseNum(getFFVal('Harga'));
    var tH=qty*hr, pAmt=tH*.11;
    setFFVal('Total Harga', tH>0?Math.round(tH):'');
    setFFVal('Harga (PPN)', pAmt>0?Math.round(pAmt):'');
    setFFVal('Grand Total + (PPN 11%)', tH>0?Math.round(tH+pAmt):'');
  }
}

// ─── File upload ──────────────────────────────────────────────────────────────
function triggerUpload(fieldId){ activeFileField=fieldId; document.getElementById('hidden-file-input').value=''; document.getElementById('hidden-file-input').click(); }
function clearField(id){ var el=document.getElementById(id); if(el){ el.value=''; el.focus(); } }
 
// Ukuran maksimal per chunk: 3 MB dalam Base64 ≈ 2.25 MB data biner
// PropertiesService GAS punya batas 9 KB per property, tapi kita pakai 256 KB per chunk
// Batas total script properties = 500 KB, jadi pakai chunk 180 KB Base64 (≈ 135 KB biner)
var UPLOAD_CHUNK_SIZE = 180 * 1024; // 180 KB per chunk (Base64 chars)
 
function handleFileChange(input){
  var file=input.files[0]; if(!file||!activeFileField) return;
  var stEl  = document.getElementById('st-'+activeFileField);
  var btnEl = document.getElementById('btn-ul-'+activeFileField);
  var fid   = activeFileField;
  var sec   = currentSection; // simpan section saat upload dipicu
 
  if(file.size > 50*1024*1024){
    if(stEl) stEl.textContent='❌ File terlalu besar (maks 50 MB)';
    showToast('File melebihi batas 50 MB','error'); return;
  }
 
  // Subfolder level-2: nama item/barang dari field yang relevan
  var itemFieldKey  = ITEM_NAME_FIELD[sec] || '';
  var subFolderName = itemFieldKey ? (getFFVal(itemFieldKey)||'').trim() : '';
 
  // Label folder untuk info ke user
  var menuLabels = {
    'purchase-requests':'Purchase Request','purchase-orders':'Purchase Order',
    'quotations':'Quotation','invoices':'Invoice',
    'status':'Delivery Status','suppliers':'Supplier Vendor'
  };
  var menuLabel = menuLabels[sec] || sec || '';
  var pathInfo  = menuLabel + (subFolderName ? ' / '+subFolderName : '');
 
  if(stEl) stEl.textContent='Membaca file…';
  if(btnEl){ btnEl.disabled=true; btnEl.innerHTML='<i class="fas fa-circle-notch fa-spin"></i>'; }
 
  var reader = new FileReader();
  reader.onerror = function(){
    if(btnEl){ btnEl.disabled=false; btnEl.innerHTML='<i class="fas fa-upload"></i>Upload'; }
    if(stEl) stEl.textContent='❌ Gagal membaca file.';
    showToast('Gagal membaca file','error');
  };
  reader.onload = function(e){
    var fullB64 = e.target.result.split(',')[1];
 
    if(fullB64.length <= 3*1024*1024){
      // ── Single-shot ────────────────────────────────────────────
      if(stEl) stEl.textContent='⬆ Mengupload '+file.name+' → 📁 '+pathInfo+'…';
      google.script.run
        .withSuccessHandler(function(r){ _onUploadDone(r, fid, stEl, btnEl); })
        .withFailureHandler(function(err){ _onUploadFail(err, stEl, btnEl); })
        .uploadFileToDrive(fullB64, file.name, file.type, subFolderName, sec);
    } else {
      // ── Chunked ────────────────────────────────────────────────
      var chunks = [];
      for(var pos=0; pos<fullB64.length; pos+=UPLOAD_CHUNK_SIZE)
        chunks.push(fullB64.substring(pos, pos+UPLOAD_CHUNK_SIZE));
      var totalChunks = chunks.length;
      if(stEl) stEl.textContent='⬆ Inisialisasi upload '+totalChunks+' bagian → 📁 '+pathInfo+'…';
 
      google.script.run
        .withSuccessHandler(function(initR){
          if(!initR||!initR.success){
            _onUploadFail({message:(initR&&initR.error)||'Init gagal'}, stEl, btnEl); return;
          }
          _sendChunk(initR.tempKey, chunks, 0, totalChunks, file.name, stEl, btnEl, fid);
        })
        .withFailureHandler(function(err){ _onUploadFail(err, stEl, btnEl); })
        .initChunkedUpload(file.name, file.type, subFolderName, sec);
    }
  };
  reader.readAsDataURL(file);
}
 
function _sendChunk(tempKey, chunks, idx, total, fileName, stEl, btnEl, fid){
  if(stEl) stEl.textContent='⬆ Mengirim bagian '+(idx+1)+'/'+total+' ('+fileName+')…';
  google.script.run
    .withSuccessHandler(function(r){
      if(!r||!r.success){
        _onUploadFail({message:(r&&r.error)||'Chunk gagal'}, stEl, btnEl); return;
      }
      if(idx+1 < total){
        // Kirim chunk berikutnya
        _sendChunk(tempKey, chunks, idx+1, total, fileName, stEl, btnEl, fid);
      } else {
        // Langkah 3: finalize
        if(stEl) stEl.textContent='⏳ Menggabungkan file…';
        google.script.run
          .withSuccessHandler(function(fr){ _onUploadDone(fr, fid, stEl, btnEl); })
          .withFailureHandler(function(err){ _onUploadFail(err, stEl, btnEl); })
          .finalizeChunkedUpload(tempKey);
      }
    })
    .withFailureHandler(function(err){ _onUploadFail(err, stEl, btnEl); })
    .appendChunk(tempKey, chunks[idx], idx);
}
 
function _onUploadDone(r, fid, stEl, btnEl){
  if(btnEl){ btnEl.disabled=false; btnEl.innerHTML='<i class="fas fa-upload"></i>Upload'; }
  if(r&&r.success){
    var el=document.getElementById(fid);
    if(el) el.value=r.url;
    var path = r.folderPath || r.folderName || '';
    var folderInfo = path ? ' &nbsp;<span style="color:#64748b;font-size:10px">📁 '+path+'</span>' : '';
    if(stEl) stEl.innerHTML='<a href="'+r.url+'" target="_blank" style="color:var(--green);font-size:11px"><i class="fas fa-check-circle"></i> Tersimpan di Drive'+folderInfo+' — <u>Lihat file</u></a>';
    showToast('✅ File tersimpan di Drive'+(path?' → '+path:''),'success');
  } else {
    if(stEl) stEl.textContent='❌ Upload gagal: '+(r&&r.error?r.error:'Error tidak diketahui');
    showToast('Upload gagal: '+((r&&r.error)||'Error tidak diketahui'),'error');
  }
}
 
function _onUploadFail(err, stEl, btnEl){
  if(btnEl){ btnEl.disabled=false; btnEl.innerHTML='<i class="fas fa-upload"></i>Upload'; }
  var msg = (err&&err.message) ? err.message : JSON.stringify(err||'Unknown error');
  if(stEl) stEl.textContent='❌ Error: '+msg;
  showToast('Upload error: '+msg,'error');
}

function loadAdminBmsFrame(){
  var frame = document.getElementById('admin-bms-iframe');
  var loading = document.getElementById('admin-bms-loading');
  var errorBox = document.getElementById('admin-bms-error');
  if(!frame) return;

  if(loading) loading.classList.remove('hidden');
  if(errorBox) errorBox.classList.add('hidden');
  frame.classList.remove('hidden');

  // Tandai loaded begitu iframe selesai render (best-effort; cross-origin
  // tidak bisa diperiksa isinya, hanya event load yang bisa dideteksi)
  frame.onload = function(){
    _adminBmsLoaded = true;
    if(loading) loading.classList.add('hidden');
    if(_adminBmsTimeout){ clearTimeout(_adminBmsTimeout); _adminBmsTimeout = null; }
  };

  // Set src untuk memicu load (cache-bust ringan agar "Muat Ulang" benar2 reload)
  frame.src = ADMIN_BMS_URL;

  // Jika dalam 12 detik tidak ada event 'load' sama sekali (misalnya
  // diblokir oleh X-Frame-Options/CSP di sisi Web App tujuan), tampilkan fallback
  if(_adminBmsTimeout) clearTimeout(_adminBmsTimeout);
  _adminBmsTimeout = setTimeout(function(){
    if(!_adminBmsLoaded){
      if(loading) loading.classList.add('hidden');
      if(errorBox) errorBox.classList.remove('hidden');
    }
  }, 12000);
}

function reloadAdminBmsFrame(){
  _adminBmsLoaded = false;
  loadAdminBmsFrame();
}

function updateProfilePhotoDisplay(photoUrl){
  var img = document.getElementById('acc-photo');
  var sbImg = document.getElementById('sb-avatar-img');
  var sbPh = document.getElementById('sb-avatar-ph');
  // Terima URL https:// maupun data:image/ (base64)
  if(photoUrl && ((/^https?:\/\//i.test(photoUrl)) || (/^data:image\//i.test(photoUrl)))){
    if(img){ img.src = photoUrl; }
    if(sbImg){ sbImg.src = photoUrl; sbImg.classList.remove('hidden'); }

function handleProfilePhotoChange(input){
  var file = input.files[0];
  if(!file||!currentUser) return;
  if(file.size > 3*1024*1024){ showToast('Foto maksimal 3MB','error'); return; }
  var btn = document.querySelector('.acc-photo-btn');
  if(btn){ btn.innerHTML='<i class="fas fa-circle-notch fa-spin"></i>'; btn.disabled=true; }

  var reader = new FileReader();
  reader.onload = function(e){
    var originalDataUrl = e.target.result;

    // Kompres gambar via canvas sebelum disimpan
    var img = new Image();
    img.onload = function(){
      var canvas = document.createElement('canvas');
      var MAX = 400;
      var ratio = Math.min(MAX/img.width, MAX/img.height, 1);
      canvas.width  = Math.round(img.width  * ratio);
      canvas.height = Math.round(img.height * ratio);
      var ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      var compressed = canvas.toDataURL('image/jpeg', 0.82);

      try {
        localStorage.setItem('bms_photo_'+currentUser.username, compressed);
      } catch(ex){
        // Jika localStorage penuh, coba simpan tanpa kompresi ulang
        try { localStorage.setItem('bms_photo_'+currentUser.username, originalDataUrl); } catch(ex2){
          showToast('Penyimpanan lokal penuh. Coba foto yang lebih kecil.','error');
          if(btn){ btn.innerHTML='<i class="fas fa-camera"></i>'; btn.disabled=false; }
          return;
        }
      }

      if(btn){ btn.innerHTML='<i class="fas fa-camera"></i>'; btn.disabled=false; }
      updateProfilePhotoDisplay(compressed);
      showToast('Foto profil berhasil diperbarui!','success');

      // Opsional: coba sync ke Google Drive jika tersedia
      try {
        var b64 = compressed.split(',')[1];
        var fileName = 'profile_'+currentUser.username+'_'+Date.now()+'.jpg';
        google.script.run
          .withSuccessHandler(function(r){
            if(r&&r.success&&r.url){
              try { localStorage.setItem('bms_photo_'+currentUser.username, r.url); } catch(ex){}
              updateProfilePhotoDisplay(r.url);
            }
          })
          .withFailureHandler(function(){})
          .updateUserPhotoUrl && google.script.run.uploadFileToDrive(b64, fileName, 'image/jpeg', currentUser.username, 'profile-photos');
      } catch(ex){}
    };
    img.onerror = function(){
      // fallback simpan langsung tanpa canvas
      try { localStorage.setItem('bms_photo_'+currentUser.username, originalDataUrl); } catch(ex){}
      if(btn){ btn.innerHTML='<i class="fas fa-camera"></i>'; btn.disabled=false; }
      updateProfilePhotoDisplay(originalDataUrl);
      showToast('Foto profil berhasil diperbarui!','success');
    };
    img.src = originalDataUrl;
  };
  reader.onerror = function(){
    if(btn){ btn.innerHTML='<i class="fas fa-camera"></i>'; btn.disabled=false; }
    showToast('Gagal membaca file foto.','error');
  };
  reader.readAsDataURL(file);
}

// ─── Equalizer visual dekoratif ─────────────────────────────────────────────
// Catatan: audio sesungguhnya diputar di dalam iframe lintas-domain (YouTube/Spotify),
// sehingga data gelombang suara asli TIDAK bisa diakses oleh browser karena alasan
// keamanan (cross-origin). Animasi ini sintetis namun didesain agar terlihat
// hidup & responsif selama status "sedang diputar" aktif.
var _eqRAF=null, _eqBars=[6,11,16,11,7,13,9];
function startEqVisualizer(){
  var cv=document.getElementById('eq-canvas');
  if(!cv) return;
  var ctx=cv.getContext('2d');
  if(_eqRAF) cancelAnimationFrame(_eqRAF);
  var barW=4, gap=2, n=_eqBars.length;
  var t=0;
  function frame(){
    t+=0.12;
    ctx.clearRect(0,0,cv.width,cv.height);
    for(var i=0;i<n;i++){
      var h = 4 + Math.abs(Math.sin(t + i*1.3)) * 13 + Math.random()*2;
      h = Math.min(h, cv.height-1);
      ctx.fillStyle = '#4ade80';
      ctx.fillRect(i*(barW+gap), cv.height-h, barW, h);
    }
    _eqRAF = requestAnimationFrame(frame);
  }
  frame();
}
function stopEqVisualizer(){
  if(_eqRAF){ cancelAnimationFrame(_eqRAF); _eqRAF=null; }
  var cv=document.getElementById('eq-canvas');
  if(cv){ var ctx=cv.getContext('2d'); ctx.clearRect(0,0,cv.width,cv.height); }
}

// Shuffle dengan seed dari tanggal hari ini -> urutan acak tapi tetap sama sepanjang hari itu,
// dan otomatis berganti susunan keesokan harinya, sehingga "tidak monoton" tapi tetap stabil per sesi.
function _seededShuffle(arr, seed){
  var a = arr.slice();
  var s = seed;
  function rnd(){ s = (s*9301+49297) % 233280; return s/233280; }
  for(var i=a.length-1;i>0;i--){
    var j = Math.floor(rnd()*(i+1));
    var tmp=a[i]; a[i]=a[j]; a[j]=tmp;
  }
  return a;
}
function _todaySeed(){
  var d=new Date();
  return d.getFullYear()*372 + d.getMonth()*31 + d.getDate();
}

// ─── Parser URL YouTube — mendukung semua bentuk link agar lagu/video diputar utuh ──
function parseYouTubeEmbed(url, playFullPlaylist){
  try{
    var raw = url.trim();
    // Normalisasi: YouTube Music pakai domain berbeda tapi struktur URL identik dengan YouTube biasa
    raw = raw.replace('music.youtube.com','www.youtube.com');
    var u = new URL(raw);
    var host = u.hostname.replace(/^m\./,''); // tangani juga m.youtube.com

    var vid = u.searchParams.get('v');
    var list = u.searchParams.get('list');

    // youtu.be/VIDEOID (link pendek hasil share)
    if(host==='youtu.be'){
      vid = u.pathname.slice(1).split('/')[0];
    }
    // youtube.com/shorts/VIDEOID
    if(/\/shorts\//.test(u.pathname)){
      vid = u.pathname.split('/shorts/')[1].split('/')[0];
    }
    // youtube.com/embed/VIDEOID (sudah berupa link embed)
    if(/\/embed\//.test(u.pathname)){
      vid = u.pathname.split('/embed/')[1].split('/')[0];
    }
    // youtube.com/playlist?list=...
    if(/\/playlist/.test(u.pathname) && list){
      vid = null;
    }

    var params = 'autoplay=1&rel=0&playsinline=1';
    // Jika ada list (playlist) DAN diminta putar penuh, ATAU memang tidak ada video tunggal -> putar seluruh playlist
    if(list && (playFullPlaylist || !vid)){
      return 'https://www.youtube.com/embed/videoseries?list='+list+'&'+params;
    }
    // Video tunggal yang merupakan bagian dari playlist -> tetap sertakan list agar tombol next/prev playlist berfungsi,
    // tapi video yang diputar adalah video yang dipilih (sesuai ekspektasi user, bukan dari awal playlist)
    if(vid){
      return 'https://www.youtube.com/embed/'+vid+'?'+params+(list?'&list='+list+'&index='+(u.searchParams.get('index')||'1'):'');
    }
    if(list){
      return 'https://www.youtube.com/embed/videoseries?list='+list+'&'+params;
    }
  }catch(e){}
  return '';
}
// ─── Parser URL Spotify — mendukung track/album/playlist/episode/show ──────────
function parseSpotifyEmbed(url){
  try{
    var u = new URL(url.trim());
    if(u.hostname!=='open.spotify.com') return '';
    // pathname contoh: /playlist/xxxx, /track/xxxx, /album/xxxx, /intl-id/playlist/xxxx (ada locale prefix)
    var path = u.pathname.replace(/^\/intl-[a-z]{2}\//,'/'); // buang prefix locale jika ada, mis. /intl-id/
    if(!/\/(track|album|playlist|episode|show|artist)\//.test(path)) return '';
    return 'https://open.spotify.com/embed'+path+'?utm_source=generator&theme=0';
  }catch(e){}
  return '';
}

      return s;
    });

  var csv='\ufeff'+csvRows.join('\n');

  var mm=ROMAN[d.getMonth()];

}

function fmtRpSP(n){return 'Rp '+new Intl.NumberFormat('id-ID').format(Math.round(n));}

// ─── Rumus Profit ────────────────────────────────────────────────────────────
// Input "profit" adalah Cost Ratio (rasio modal terhadap harga jual)
// Contoh: modal = 400, profit = 0.8 → Harga Jual = 400 / 0.8 = 500
// Keuntungan = Harga Jual - Harga Modal = 500 - 400 = 100
// Gross Margin = Keuntungan / Harga Jual × 100 = 20%
// Kebalikan: jika diketahui Harga Jual → profit (cost ratio) = Modal / Harga Jual
function spHargaJual(modal, costRatio){
  if(!costRatio || costRatio<=0 || costRatio>1) return modal; // guard: ratio harus 0 < x ≤ 1
  return modal / costRatio;                                    // 400 / 0.8 = 500
}
function spKeuntungan(modal, costRatio){
  if(!costRatio || costRatio<=0 || costRatio>1) return 0;
  return (modal / costRatio) - modal;                          // 500 - 400 = 100
}
function spMarginPct(modal, costRatio){
  // Gross margin % = Keuntungan / Harga Jual × 100
  if(!costRatio || costRatio<=0 || costRatio>1) return 0;
  return (1 - costRatio) * 100;                               // (1 - 0.8) × 100 = 20%
}
function spFaktorLabel(costRatio){
  if(!costRatio||costRatio<=0) return '';
  return '÷' + Number(costRatio).toFixed(2);                  // ÷0.80
}
function spProfitFromHargaJual(hargaJual, modal){
  // Cost ratio = Modal / Harga Jual
  if(!hargaJual || hargaJual<=0) return 0;
  return modal / hargaJual;                                   // 400 / 500 = 0.8
}

function calcSPTotals(){
  var subTotal=spItems.reduce(function(s,i){
    var hargaEfektif = i.hargaModal>0 ? spHargaJual(i.hargaModal, i.profit) : (i.hargaSatuan||0);
    return s+(i.jumlah*hargaEfektif);
  },0);
  var ppnSel=document.getElementById('sp-ppn-mode');
  var ppnRate=ppnSel?parseFloat(ppnSel.value)||0:11;
  var ppnLabel=ppnRate===0?'Tanpa PPN':'PPN '+ppnRate+'%';
  var pajak=subTotal*(ppnRate/100);
  var lainLain=parseFloat((document.getElementById('sp-lain-lain')||{}).value||'0')||0;
  var grandTotal=subTotal+pajak+lainLain;
  var set=function(id,val){var el=document.getElementById(id);if(el)el.textContent=val;};
  var lblEl=document.getElementById('sp-pajak-label');if(lblEl)lblEl.textContent=ppnLabel;
  set('sp-subtotal',fmtRpSP(subTotal));set('sp-pajak',fmtRpSP(pajak));set('sp-grandtotal',fmtRpSP(grandTotal));
  window._spCalc={subTotal:subTotal,pajak:pajak,ppnRate:ppnRate,ppnLabel:ppnLabel,lainLain:lainLain,grandTotal:grandTotal};
}

// 4 Tipe: TEMPO | KODE007 | COD | NONPPN

var invItems = [];
var _invNpwpDb = []; // cache DATABASE NPWP dari GAS

// ── Auto-fill sumber data customer ──────────────────────────────────────────
// Sumber 1: sheet "DATABASE NPWP" (NAMA, NPWP, ALAMAT)
// Sumber 2: record invoice sebelumnya (store['invoices'])
function _invGetCustomerPool(){
  var pool = {};
  // Dari DATABASE NPWP (via cache yang di-load di awal atau saat buka form)
  _invNpwpDb.forEach(function(r){
    var n = (r['NAMA']||r['Nama']||'').trim();
    if(!n) return;
    pool[n.toUpperCase()] = {nama:n, npwp:r['NPWP']||r['Npwp']||'', alamat:r['ALAMAT']||r['Alamat']||''};
  });
  // Dari record invoice sebelumnya (lebih lengkap, bisa override)
  (store['invoices']||[]).forEach(function(r){
    var n = (r['Nama Perusahaan']||r['Nama Customer']||'').trim();
    if(!n) return;
    var key = n.toUpperCase();
    if(!pool[key]) pool[key] = {nama:n, npwp:'', alamat:''};
    if(r['NPWP'] && r['NPWP']!=='') pool[key].npwp = r['NPWP'];
    if(r['Alamat'] && r['Alamat']!=='') pool[key].alamat = r['Alamat'];
    if(r['Nomer PO']||r['No PO']) pool[key].lastPO = r['Nomer PO']||r['No PO']||'';
  });
  return Object.values(pool).sort(function(a,b){ return a.nama.localeCompare(b.nama); });
}

function invSearchCustomer(q, src){
  var list = document.getElementById('inv-autocomplete-list');
  if(!list) return;
  var query = (q||'').trim().toLowerCase();
  if(query.length < 1){ list.style.display='none'; return; }
  var pool = _invGetCustomerPool();
  var matches = pool.filter(function(p){ return p.nama.toLowerCase().indexOf(query)>=0; }).slice(0,12);
  if(matches.length===0){ list.style.display='none'; return; }
  list.innerHTML = matches.map(function(p){
    return '<div onclick="invFillCustomer('+JSON.stringify(JSON.stringify(p))+',event)" style="padding:8px 12px;cursor:pointer;border-bottom:1px solid #f1f5f9;font-size:12px;transition:background .12s" onmouseover="this.style.background=\'#f0fdf4\'" onmouseout="this.style.background=\'\'">'+
      '<div style="font-weight:600;color:#0f172a">'+p.nama+'</div>'+
      (p.npwp?'<div style="font-size:10.5px;color:#64748b">NPWP: '+p.npwp+'</div>':'')+

    '</div>';
  }).join('');
  list.style.display='block';
}

function invOnTipeChange(){
  var tipe = (document.getElementById('inv-tipe')||{}).value||'TEMPO';

  var dppRow  = document.getElementById('inv-dpp-row');

  var jthLbl  = document.getElementById('inv-jatuh-tempo-lbl');
  var termEl  = document.getElementById('inv-term');
  var jthEl   = document.getElementById('inv-jatuh-tempo');

  if(tipe==='NONPPN'){
    // Tanpa PPN — tampilkan DPP dengan label "DPP NILAI LAIN", sembunyikan PPN
    if(ppnRow)  ppnRow.style.display='none';
    if(dppLbl)  dppLbl.textContent='DPP NILAI LAIN';

  } else {
    if(ppnRow)  ppnRow.style.display='flex';
    if(dppLbl)  dppLbl.textContent='DPP (Dasar Pengenaan Pajak)';
  }

  if(tipe==='COD'){
    // COD/CBD: Jatuh Tempo = "-", Term = CBD/COD
    if(termEl){ termEl.value='CBD'; }
    if(jthEl)  jthEl.value='';
    if(jthLbl) jthLbl.firstChild.textContent='Jatuh Tempo';
    var kEl=document.getElementById('inv-keterangan');
    if(kEl&&!kEl.value) kEl.value='CBD';
  } else if(tipe==='TEMPO'||tipe==='KODE007'){
    if(termEl && termEl.value!=='Net 30 (30 days from invoice date)' &&
                 termEl.value!=='Net 60 (60 days from invoice date)' &&
                 termEl.value!=='Net 15 (15 days from invoice date)'){
      termEl.value='Net 30 (30 days from invoice date)';
    }
    invAutoJatuhTempo();
  }
  calcInvTotals();
}

// ── Jatuh Tempo otomatis ─────────────────────────────────────────────────────
function invAutoJatuhTempo(){
  var tglEl  = document.getElementById('inv-tanggal');
  var termEl = document.getElementById('inv-term');
  var jthEl  = document.getElementById('inv-jatuh-tempo');
  var tipeEl = document.getElementById('inv-tipe');
  if(!tglEl||!termEl||!jthEl||!tglEl.value) return;
  var tipe = (tipeEl||{}).value||'TEMPO';
  var term = termEl.value;
  if(tipe==='COD'||term==='CBD'||term==='COD'||term==='Advance Payment'){
    jthEl.value=''; return;
  }
  var tgl  = new Date(tglEl.value+'T00:00:00');
  var days = term.indexOf('60')>=0?60:term.indexOf('15')>=0?15:30;
  tgl.setDate(tgl.getDate()+days);
  jthEl.value = tgl.toISOString().slice(0,10);
}

// ── Kalkulasi utama ──────────────────────────────────────────────────────────
function calcInvTotals(){
  var hargaJual = invItems.reduce(function(s,i){ return s+(parseIDNumber(i.qty)*parseIDNumber(i.hargaSatuan)); },0);
  var tipe = (document.getElementById('inv-tipe')||{}).value||'TEMPO';

  // Potongan harga
  var potRaw  = parseIDNumber((document.getElementById('inv-potongan')||{}).value||'0')||0;
  var potType = ((document.getElementById('inv-diskon-type')||{}).value)||'nominal';
  var potChecked = (document.getElementById('inv-diskon-toggle')||{}).checked;
  var potongan = 0;
  if(potChecked && potRaw>0){
    potongan = potType==='persen' ? Math.round(hargaJual*potRaw/100) : potRaw;
  }

  // Uang Muka / DP
  var dpChecked = (document.getElementById('inv-dp-toggle')||{}).checked;
  var uangMuka = dpChecked ? (parseIDNumber((document.getElementById('inv-uang-muka')||{}).value||'0')||0) : 0;

  // DPP — formula sama dengan template: Harga Jual - Potongan - Uang Muka
  var dpp   = Math.max(0, hargaJual - potongan - uangMuka);

  // PPN 12% — hanya untuk tipe yang ada PPN
  // Catatan template NON PPN: DPP Nilai Lain = harga_jual * (100/112) ≈ 89.28%
  var ppn = 0, total = 0;
  if(tipe==='NONPPN'){
    // Template NON PPN: DPP nilai lain = HARGA_JUAL × (100/112), PPN = DPP × 12%
    // Hasilnya = HARGA_JUAL sama karena DPP×1.12 = HJ
    var dppNonPPN = Math.round(dpp * 100/112);
    ppn   = Math.round(dppNonPPN * 0.12);
    total = dppNonPPN + ppn; // sama dengan dpp awal
    dpp   = dppNonPPN; // tampilkan DPP setelah koreksi
  } else {
    ppn   = Math.round(dpp * 0.12);
    total = dpp + ppn;
  }

  var fR = fmtRpInv;
  var set = function(id,v){var el=document.getElementById(id);if(el)el.textContent=v;};

  set('inv-harga-jual', fR(hargaJual));
  set('inv-potongan-display', potongan>0 ? '- '+fR(potongan) : fR(0));
  set('inv-dp-display',       uangMuka>0 ? '- '+fR(uangMuka)  : fR(0));
  set('inv-dpp',              fR(dpp));
  set('inv-ppn',              tipe==='NONPPN'?fR(ppn):'PPN 12%: '+fR(ppn));
  if(tipe!=='NONPPN'){
    set('inv-ppn', fR(ppn));
  }
  set('inv-total',            fR(total));
  set('inv-terbilang',        invTerbilang(total));

  var ppnLbl = document.getElementById('inv-ppn-label');
  if(ppnLbl) ppnLbl.textContent = tipe==='NONPPN'?'PPN 12% (dari DPP Nilai Lain)':'PPN 12%';

  window._invCalc = {hargaJual:hargaJual, potongan:potongan, uangMuka:uangMuka, dpp:dpp, ppn:ppn, total:total, tipe:tipe};
  renderInvItems();
}

// ── Terbilang Rupiah ─────────────────────────────────────────────────────────
function invTerbilang(n){
  n = Math.round(n);
  if(n===0) return 'Nol Rupiah';
  var satuan=['','Satu','Dua','Tiga','Empat','Lima','Enam','Tujuh','Delapan','Sembilan',
              'Sepuluh','Sebelas','Dua Belas','Tiga Belas','Empat Belas','Lima Belas',
              'Enam Belas','Tujuh Belas','Delapan Belas','Sembilan Belas'];
  var tens=['','','Dua Puluh','Tiga Puluh','Empat Puluh','Lima Puluh','Enam Puluh','Tujuh Puluh','Delapan Puluh','Sembilan Puluh'];
  function ratusan(x){
    if(x<20) return satuan[x]||'';
    if(x<100) return tens[Math.floor(x/10)]+(x%10?' '+satuan[x%10]:'');
    return (x<200?'Seratus':satuan[Math.floor(x/100)]+' Ratus')+(x%100?' '+ratusan(x%100):'');
  }
  function jutaan(x){
    if(x<1000)    return ratusan(x);
    if(x<1e6)     { var r=Math.floor(x/1000); return (r===1?'Seribu':ratusan(r)+' Ribu')+(x%1000?' '+ratusan(x%1000):''); }
    if(x<1e9)     return ratusan(Math.floor(x/1e6))+' Juta'+(x%1e6?' '+jutaan(x%1e6):'');
    if(x<1e12)    return ratusan(Math.floor(x/1e9))+' Miliar'+(x%1e9?' '+jutaan(x%1e9):'');
    return ratusan(Math.floor(x/1e12))+' Triliun'+(x%1e12?' '+jutaan(x%1e12):'');
  }
  return jutaan(n)+' Rupiah';
}

function fmtRpInv(n){ return 'Rp\u00A0'+new Intl.NumberFormat('id-ID').format(Math.round(n||0)); }
function escInv(s){ return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Generate ID Invoice otomatis ─────────────────────────────────────────────
function genInvNextId(){
  var now=new Date();
  var mm=String(now.getMonth()+1).padStart(2,'0');
  var yy=String(now.getFullYear()).slice(2);
  var prefix='BMS.INV.40.'+yy+mm+'.';
  var existing=(store['invoices']||[]).map(function(r){return String(r['ID Invoice']||'');}).filter(function(s){return s.indexOf(prefix)===0;});
  var maxNum=0;
  existing.forEach(function(s){var n=parseInt(s.replace(prefix,''),10)||0;if(n>maxNum)maxNum=n;});
  return prefix+String(maxNum+1).padStart(5,'0');
}

// ── Simpan invoice ───────────────────────────────────────────────────────────
function saveInvAndExport(){
  var data=getInvFormData();
  if(!data.namaPerusahaan.trim()){ showToast('Nama Perusahaan wajib diisi','error'); return; }
  if(!data.noFaktur.trim()){       showToast('Nomor Faktur wajib diisi','error'); return; }
  if(data.items.length===0){       showToast('Minimal 1 item harus diisi','error'); return; }

  var btn=document.getElementById('inv-save-btn');
  if(btn){btn.disabled=true;btn.innerHTML='<i class="fas fa-circle-notch fa-spin"></i> Menyimpan…';}

  var allNames=data.items.map(function(i){return i.namaBarang;}).join(', ');

  var rowData={
    'ID Invoice':         data.noFaktur,
    'Tanggal Invoice':    data.tanggal,
    'Nama Customer':      data.namaPerusahaan,
    'Nama Perusahaan':    data.namaPerusahaan,
    'Nomer PO':           data.noPO||'',
    'Invoice Title':      allNames,
    'Nominal Tagihan':    String(Math.round(data.total)),
    'Harga Jual':         String(Math.round(data.hargaJual)),
    'Potongan Harga':     String(Math.round(data.potongan||0)),
    'Uang Muka':          String(Math.round(data.uangMuka||0)),
    'DPP':                String(Math.round(data.dpp)),
    'PPN 12%':            String(Math.round(data.ppn)),
    'Jatuh Tempo':        data.jatuhTempo||'',
    'Term of Payment':    data.term||'',
    'Nomor Faktur Pajak': data.fakturPajak||'',
    'NPWP':               data.npwp||'',
    'Alamat':             data.alamat||'',
    'Keterangan':         data.keterangan||'',
    'Tipe Invoice':       data.tipe||'TEMPO',
    'Items':              JSON.stringify(data.items),
    'Status':             'Belum Lunas',
    'Faktur Invoice File':''
  };

  var isEdit=!!(window._invEditRow);
  var existingIdx=0;
  if(isEdit){
    var inv=store['invoices']||[];
    for(var i=0;i<inv.length;i++){if(inv[i]['ID Invoice']===data.noFaktur){existingIdx=i+2;break;}}
  }

  google.script.run
    .withSuccessHandler(function(r){
      if(btn){btn.disabled=false;btn.innerHTML='<i class="fas fa-save"></i>Simpan &amp; PDF';}
      if(r&&r.success){
        cacheClear('invoices'); loaded['invoices']=false;
        showToast('✅ Invoice '+data.noFaktur+' tersimpan!','success');
        logActivity(isEdit?'Edit':'Tambah','invoices',data.noFaktur,data.namaPerusahaan);
        addNotification('invoices',isEdit?'Edit':'Tambah',data.noFaktur,data.namaPerusahaan,null);
        window._invEditRow=null;
        exportInvoiceHTMLPDF(data);
        closeModal('inv-modal');
        reloadSection('invoices');
      } else {
        showToast('❌ Gagal simpan: '+((r&&r.error)||'Error tidak diketahui'),'error');
      }
    })
    .withFailureHandler(function(err){
      if(btn){btn.disabled=false;btn.innerHTML='<i class="fas fa-save"></i>Simpan &amp; PDF';}
      showToast('❌ Error: '+((err&&err.message)||'Gagal menyimpan'),'error');
    })
    .saveRecord('Invoice',rowData,isEdit?existingIdx:0);
}

// PDF EXPORT — Layout identik dengan Template_Faktur_Invoice.xlsx
// ════════════════════════════════════════════════════════════════════════════
function exportInvoiceHTMLPDF(data){
  var items = data.items.filter(function(i){ return i.namaBarang && String(i.namaBarang).trim(); });
  if(items.length===0){ showToast('Tidak ada item untuk dicetak','error'); return; }

  function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function fD(d){
    if(!d||d==='-') return d||'-';
    try{ return new Date(d+'T00:00:00').toLocaleDateString('id-ID',{day:'2-digit',month:'2-digit',year:'numeric'}); }
    catch(e){ return d; }
  }
  function fN(n){
    // Format angka Indonesia tanpa prefix — sesuai template Excel
    if(n===null||n===undefined||n==='') return '';
    var v = Math.round(parseIDNumber(n));
    if(v===0) return '-';
    return new Intl.NumberFormat('id-ID').format(v);
  }

  var judul    = (data.tipe==='NONPPN') ? 'F A K T U R' : 'FAKTUR / INVOICE';
  var isCOD    = data.tipe==='COD';
  var isNonPPN = data.tipe==='NONPPN';
  var dppLabel = isNonPPN ? 'DPP NILAI LAIN' : 'DASAR PENGENAAN PAJAK';

  var keterangan = data.keterangan||'';
  if(!keterangan){
    if(isCOD) keterangan='CBD';
    else if(data.term) keterangan='Term of Payment : '+data.term;
  }
  var jatuhTempoStr = isCOD ? '-' : (data.jatuhTempo ? fD(data.jatuhTempo) : '-');

  var hj  = data.hargaJual||0;
  var pt  = data.potongan||0;
  var dp  = data.uangMuka||0;
  var dpp = data.dpp||0;
  var ppn = data.ppn||0;
  var tot = data.total||0;

  // ── Baris item: min 15 baris seperti template (rows 17–31 di Excel = 15 baris) ──
  var MIN_ROWS = 15;
  var itemHTML = '';
  items.forEach(function(it, i){
    var sub = Math.round(parseIDNumber(it.qty) * parseIDNumber(it.hargaSatuan));
    itemHTML +=
      '<tr>'+
        '<td class="c b" style="width:5%">'+(i+1)+'</td>'+
        '<td class="l b" style="width:45%">'+esc(it.namaBarang)+'</td>'+
        '<td class="c b" style="width:8%">'+(it.qty%1===0?it.qty:parseFloat(it.qty).toFixed(2))+'</td>'+
        '<td class="c b" style="width:8%">'+esc(it.unit||'KG')+'</td>'+
        '<td class="r b" style="width:17%">'+fN(parseIDNumber(it.hargaSatuan))+'</td>'+
        '<td class="r b" style="width:17%">'+fN(sub)+'</td>'+
      '</tr>';
  });
  // Baris kosong padding
  for(var ei=items.length; ei<MIN_ROWS; ei++){
    itemHTML += '<tr><td class="b eh">&nbsp;</td><td class="b eh"></td><td class="b eh"></td><td class="b eh"></td><td class="b eh"></td><td class="b eh"></td></tr>';
  }

  // ── CSS — font 11pt, border tipis, persis seperti Excel ──
  var css =
    '*{box-sizing:border-box;margin:0;padding:0}'+
    'body{font-family:Arial,sans-serif;font-size:11pt;color:#000;background:#fff;'+
         'padding:8mm 10mm;-webkit-print-color-adjust:exact;print-color-adjust:exact}'+
    '@page{size:A4 portrait;margin:6mm 8mm}'+
    'table{border-collapse:collapse;width:100%}'+
    // Sel helper
    '.b{border:1px solid #000}'+       // border semua sisi
    '.bt{border-top:1px solid #000}'+  // border atas saja
    '.bb{border-bottom:1px solid #000}'+ // border bawah saja
    '.bl{border-left:1px solid #000}'+ // border kiri saja
    '.br{border-right:1px solid #000}'+ // border kanan saja
    '.blr{border-left:1px solid #000;border-right:1px solid #000}'+
    '.btb{border-top:1px solid #000;border-bottom:1px solid #000}'+
    '.c{text-align:center}.l{text-align:left}.r{text-align:right}'+
    '.bold{font-weight:bold}'+
    '.eh{height:18pt}'+  // empty row height
    // Print button
    '.pbtn{position:fixed;bottom:14px;right:14px;background:#0a1e35;color:#d4af6a;'+
          'border:1.5px solid #d4af6a;border-radius:8px;padding:7px 18px;font-size:11px;'+
          'font-weight:700;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.3);z-index:9999}'+
    '@media print{.pbtn{display:none}}';

  // ════════════════════════════════════════════════════════════
  // TABEL UTAMA — 6 kolom persis seperti Excel (A B C D E F)
  // Proporsi: A=5% B=45% C=8% D=8% E=17% F=17%
  // Setiap baris HTML = 1 baris di Excel, colspan = merged cells

  var html =
    '<!DOCTYPE html><html lang="id"><head>'+
    '<meta charset="UTF-8"><title>'+esc(data.noFaktur)+'</title>'+
    '<style>'+css+'</style></head><body>'+
    '<button class="pbtn" onclick="window.print()">🖨 Cetak / Simpan PDF</button>'+

    '<table>'+

    // ── ROW 1: Nama Perusahaan (A1:F1) ──
    '<tr>'+
      '<td colspan="6" class="l bold bt bl br" style="font-size:13pt;padding:3px 6px">'+
        'PT. BERKATAMA MULIA SAPUTRA'+
      '</td>'+
    '</tr>'+

    // ── ROW 2: Alamat Perusahaan (A2:F2) ──
    '<tr>'+
      '<td colspan="6" class="l bl br" style="font-size:10pt;padding:1px 6px">'+
        'Dsn. Gamping Kulon RT. 004 RW. 002 Jerukgamping, Krian Kab. Sidoarjo Jawa Timur'+
      '</td>'+
    '</tr>'+

    // ── ROW 3: Garis kosong separator (A3:F3) ──
    '<tr><td colspan="6" class="btb bl br" style="height:4px"></td></tr>'+

    // ── ROW 4: [A4:B5]=JUDUL FAKTUR | [C4]=Label No.Faktur | [F4]=Label Tanggal ──
    // Excel: A4:B5 merged = "F A K T U R" / "FAKTUR/INVOICE", center, bold

    //        F4      = "Tanggal" / "Tanggal Invoice" (label, bold)
    '<tr>'+
      '<td rowspan="2" colspan="2" class="c bold b" style="font-size:13pt;vertical-align:middle">'+
        esc(judul)+
      '</td>'+
      '<td colspan="3" class="l bold bt bl" style="padding:2px 6px;font-size:10pt">'+
        'Nomor Faktur Penjualan'+
      '</td>'+
      '<td class="l bold bt bl br" style="padding:2px 6px;font-size:10pt">'+
        'Tanggal'+
      '</td>'+
    '</tr>'+

    // ── ROW 5: [C5:E5]=Nilai No.Faktur | [F5]=Nilai Tanggal ──
    '<tr>'+

      '<td class="l bb bl br" style="padding:2px 6px;font-size:11pt">'+
        fD(data.tanggal)+'</td>'+
    '</tr>'+

    // ── ROW 8: [A8:B8]=Alamat baris 1 | [C8:F8]=Label "Nomor Faktur Pajak" ──

var notifications = [];
var NOTIF_KEY = 'bms_notifications';
var NOTIF_MAX = 50;
var notifPanelOpen = false;

var NOTIF_CFG = {
  'purchase-requests': {icon:'fa-clipboard-list', color:'#f59e0b', bg:'#fef3c7', nav:'purchase-requests', label:'Purchase Request'},
  'purchase-orders':   {icon:'fa-shopping-cart',  color:'#2563eb', bg:'#dbeafe', nav:'purchase-orders',   label:'Purchase Order'},
  'quotations':        {icon:'fa-file-invoice',   color:'#0891b2', bg:'#e0f2fe', nav:'quotations',        label:'Quotation'},
  'invoices':          {icon:'fa-receipt',        color:'#16a34a', bg:'#dcfce7', nav:'invoices',          label:'Invoice'},
  'status':            {icon:'fa-truck',          color:'#7c3aed', bg:'#ede9fe', nav:'status',            label:'Delivery Status'},
  'suppliers':         {icon:'fa-building',       color:'#db2777', bg:'#fce7f3', nav:'suppliers',         label:'Supplier/Vendor'}
};

function loadNotifications(){
  try { var s=localStorage.getItem(NOTIF_KEY); if(s) notifications=JSON.parse(s); } catch(e){ notifications=[]; }
  renderNotifPanel();
  updateNotifBadge();
}

function addNotification(sec, action, id, customer, rowIndex){
  var cfg = NOTIF_CFG[sec]||{icon:'fa-circle',color:'#64748b',bg:'#f1f5f9',nav:sec,label:sec};
  var now = new Date();
  var pad = function(n){return String(n).padStart(2,'0');};
  var timeStr = pad(now.getDate())+'/'+pad(now.getMonth()+1)+'/'+now.getFullYear()+' '+pad(now.getHours())+':'+pad(now.getMinutes());
  var notif = {
    id:       Date.now()+'_'+Math.random().toString(36).slice(2,6),
    sec:      sec,
    action:   action,
    label:    cfg.label,
    icon:     cfg.icon,
    color:    cfg.color,
    bg:       cfg.bg,
    nav:      cfg.nav,
    dataId:   id||'',
    customer: customer||'',
    time:     timeStr,
    rowIndex: rowIndex||null,
    read:     false
  };
  notifications.unshift(notif);
  if(notifications.length > NOTIF_MAX) notifications.pop();
  try { localStorage.setItem(NOTIF_KEY, JSON.stringify(notifications)); } catch(e){}
  renderNotifPanel();
  updateNotifBadge();
  // Flash the badge
  var badge = document.getElementById('notif-badge');
  if(badge){ badge.style.animation='none'; setTimeout(function(){ badge.style.animation=''; },50); }
}

function updateNotifBadge(){
  var unread = notifications.filter(function(n){return !n.read;}).length;
  var badge = document.getElementById('notif-badge');
  if(!badge) return;
  if(unread > 0){
    badge.style.display='flex';
    badge.textContent = unread > 99 ? '99+' : unread;
  } else {
    badge.style.display='none';
  }
}

function renderNotifPanel(){
  var list = document.getElementById('notif-list');
  if(!list) return;
  if(notifications.length === 0){
    list.innerHTML='<div class="notif-empty"><i class="fas fa-bell-slash"></i>Belum ada notifikasi</div>';
    return;
  }
  list.innerHTML = notifications.map(function(n){
    var actionColor = n.action==='Tambah'?'#16a34a':n.action==='Edit'?'#2563eb':'#ef4444';
    return '<div class="notif-item'+(n.read?'':' unread')+'" onclick="clickNotif(\''+n.id+'\',\''+n.nav+'\','+JSON.stringify(n.rowIndex)+')">'
      +'<div class="notif-dot" style="background:'+n.color+'"></div>'
      +'<div class="notif-icon" style="background:'+n.bg+'">'
        +'<i class="fas '+n.icon+'" style="color:'+n.color+'"></i>'
      +'</div>'
      +'<div class="notif-body">'
        +'<div class="notif-title">'
          +'<span style="color:'+actionColor+';font-weight:800;font-size:10px;text-transform:uppercase;margin-right:5px">'+n.action+'</span>'
          +n.label+(n.dataId?' — <strong>'+n.dataId+'</strong>':'')
        +'</div>'
        +(n.customer?'<div class="notif-desc"><i class="fas fa-user" style="font-size:9px;margin-right:4px"></i>'+n.customer+'</div>':'')
        +'<div class="notif-time"><i class="fas fa-clock" style="font-size:9px"></i>'+n.time+'</div>'
      +'</div>'
    +'</div>';
  }).join('');
}

function clickNotif(notifId, sec, rowIndex){
  // Mark as read
  notifications = notifications.map(function(n){
    if(n.id===notifId) n.read=true;
    return n;
  });
  try { localStorage.setItem(NOTIF_KEY, JSON.stringify(notifications)); } catch(e){}
  updateNotifBadge();
  renderNotifPanel();
  toggleNotifPanel();

  // Navigate ke section
  var link = document.querySelector('.sb-link[onclick*="\''+sec+'\'"]');
  if(link){ nav(sec, link); }

  // Jika ada rowIndex, buka detail setelah data selesai load
  if(rowIndex !== null && rowIndex !== undefined){
    var tryOpen = function(attempt){
      var rows = store[sec]||[];
      var row = rows.find(function(r){ return r._rowIndex == rowIndex; });
      if(row){
        openDetailDrawer(sec, row, rowIndex);
      } else if(attempt < 10){
        setTimeout(function(){ tryOpen(attempt+1); }, 400);
      }
    };
    setTimeout(function(){ tryOpen(0); }, 300);
  }
}

function toggleNotifPanel(){
  var panel = document.getElementById('notif-panel');
  if(!panel) return;
  notifPanelOpen = !notifPanelOpen;
  if(notifPanelOpen){
    panel.classList.add('open');
    // Mark all visible as read after 2s
    setTimeout(function(){
      notifications = notifications.map(function(n){ n.read=true; return n; });
      try { localStorage.setItem(NOTIF_KEY, JSON.stringify(notifications)); } catch(e){}
      updateNotifBadge();
    }, 2000);
  } else {
    panel.classList.remove('open');
  }
}

function clearAllNotifs(){
  notifications=[];
  try { localStorage.removeItem(NOTIF_KEY); } catch(e){}
  renderNotifPanel();
  updateNotifBadge();
}

// Close panel when clicking outside
document.addEventListener('click', function(e){
  if(!notifPanelOpen) return;
  var panel=document.getElementById('notif-panel');
  var btn=document.getElementById('btn-notif');
  if(panel&&btn&&!panel.contains(e.target)&&!btn.contains(e.target)){
    notifPanelOpen=false; panel.classList.remove('open');
  }
});

// ═══════════════════════════════════════════════════════════════════════════
// SISTEM CACHE & LOADING OPTIMAL
// Strategy: localStorage cache → render instan → background refresh silent
// ═══════════════════════════════════════════════════════════════════════════

var CACHE_KEY_PREFIX = 'bms_cache_';
var CACHE_TTL_MS     = 5 * 60 * 1000;  // 5 menit — data cache dianggap fresh
var AUTO_REFRESH_INTERVAL = 120;        // detik — auto-refresh background
var _arTimer     = null;
var _arCountdown = AUTO_REFRESH_INTERVAL;
var _arPrevCounts = {};
var _loadingQueue = {};                 // cegah double-call section yg sama

// ── Cache helpers ─────────────────────────────────────────────────────────
function cacheSet(sec, data){
  try{
    localStorage.setItem(CACHE_KEY_PREFIX+sec, JSON.stringify({ts:Date.now(), data:data}));
  }catch(e){}
}
function cacheGet(sec){
  try{
    var raw = localStorage.getItem(CACHE_KEY_PREFIX+sec);
    if(!raw) return null;
    var obj = JSON.parse(raw);
    if(!obj||!obj.data) return null;
    obj._stale = (Date.now() - obj.ts) > CACHE_TTL_MS;
    return obj;
  }catch(e){ return null; }
}
function cacheClear(sec){
  try{ localStorage.removeItem(CACHE_KEY_PREFIX+sec); }catch(e){}
}
function cacheTimestamp(sec){
  try{
    var raw=localStorage.getItem(CACHE_KEY_PREFIX+sec);
    if(!raw) return null;
    var obj=JSON.parse(raw);
    if(!obj||!obj.ts) return null;
    var d=new Date(obj.ts);
    var p=function(n){return String(n).padStart(2,'0');};
    return p(d.getHours())+':'+p(d.getMinutes())+':'+p(d.getSeconds());
  }catch(e){ return null; }
}

// ── GAS function name map ─────────────────────────────────────────────────
var _secFnMap = {
  'dashboard':         'getDashboardData',
  'purchase-requests': 'getPurchaseRequests',
  'purchase-orders':   'getPurchaseOrders',
  'quotations':        'getQuotations',
  'invoices':          'getInvoices',
  'status':            'getDeliveryStatus',
  'suppliers':         'getSuppliers'
};

// ── Core: load satu section ───────────────────────────────────────────────
function loadSection(sec){
  if(!_secFnMap[sec]) return;
  if(_loadingQueue[sec]) return;          // sudah dalam proses, skip
  _loadingQueue[sec] = true;

  var cached = cacheGet(sec);

  // Render instan dari cache dulu (stale-while-revalidate)
  if(cached && cached.data){
    if(sec==='dashboard'){
      renderDashboard(cached.data);
    } else {
      store[sec] = cached.data;
      loaded[sec] = true;
      if(currentSection===sec) renderSection(sec,'');
      _updateInfoBar(sec, cached.data.length, cacheTimestamp(sec), cached._stale);
    }
    // Jika masih fresh, tidak perlu hit server
    if(!cached._stale){
      _loadingQueue[sec] = false;
      return;
    }
  } else {
    // Tidak ada cache — tampilkan loading skeleton
    if(sec!=='dashboard') _showSkeleton(sec);
  }

  // Hit server (background jika ada cache, foreground jika tidak)
  try{
    google.script.run
      .withSuccessHandler(function(r){ _onServerData(sec, r); })
      .withFailureHandler(function(e){
        _loadingQueue[sec]=false;
        loaded[sec]=false;
        if(!cached) showToast('Gagal memuat '+sec+': '+((e&&e.message)||'Error'),'error');
      })
      [_secFnMap[sec]]();
  }catch(e){ _loadingQueue[sec]=false; }
}

// ── Handler data dari server ──────────────────────────────────────────────
function _onServerData(sec, r){
  _loadingQueue[sec]=false;
  if(!r||!r.success){
    if(!store[sec]) showToast((r&&r.error)||'Gagal memuat '+sec,'error');
    return;
  }

  var prevCount = (_arPrevCounts[sec]||0);
  var newCount  = sec==='dashboard' ? 0 : (r.data||[]).length;

  // Deteksi data baru untuk notifikasi
  if(prevCount>0 && newCount>prevCount && sec!=='dashboard'){
    var diff = newCount - prevCount;
    var idKey = {'purchase-requests':'ID Request','purchase-orders':'ID Order',
                 'quotations':'ID Quotation','invoices':'ID Invoice',
                 'status':null,'suppliers':'ID Supplier'}[sec];
    (r.data||[]).slice(0, diff).forEach(function(row){
      var rowId = idKey?(row[idKey]||''):'';
      var cust  = row['Nama Customer']||row['Nama Perusahaan']||row['Nama Perusahaan Vendor/Supplier']||'';
      addNotification(sec,'Tambah',rowId,cust,row._rowIndex);
      logActivity('Tambah',sec,rowId,cust);
    });
  }
  if(sec!=='dashboard') _arPrevCounts[sec]=newCount;

  // Simpan ke cache dan store
  if(sec==='dashboard'){
    cacheSet(sec, r);
    renderDashboard(r);
  } else {
    store[sec]=r.data;
    loaded[sec]=true;
    cacheSet(sec, r.data);
    if(currentSection===sec) renderSection(sec,'');
    _updateInfoBar(sec, newCount, cacheTimestamp(sec), false);
    if(currentSection==='dashboard') refreshDashboardCounts();
  }
}

// ── Info bar dengan timestamp cache ───────────────────────────────────────
function _updateInfoBar(sec, count, ts, stale){
  var el=document.getElementById('info-'+sec);
  if(!el) return;
  var staleNote = stale ? ' <span style="color:#f59e0b;font-size:10px">↻ Memperbarui…</span>' : '';
  var tsNote    = ts ? ' · cache '+ts : '';
  el.innerHTML = count+' total records'+tsNote+staleNote;
}

// ── Loading skeleton ──────────────────────────────────────────────────────
function _showSkeleton(sec){
  var tb=document.getElementById('tb-'+sec);
  if(!tb) return;
  var colCount=tb.closest('table')? tb.closest('table').querySelectorAll('thead th').length : 6;
  var skRows='';
  for(var i=0;i<5;i++){
    var cells='';
    for(var j=0;j<colCount;j++){
      cells+='<td><div style="height:12px;background:linear-gradient(90deg,#e2e8f0 25%,#f1f5f9 50%,#e2e8f0 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:4px;width:'+(60+Math.random()*35).toFixed(0)+'%"></div></td>';
    }
    skRows+='<tr>'+cells+'</tr>';
  }
  tb.innerHTML=skRows;
}

// ── Preload semua seksi di background setelah login ───────────────────────
function preloadAllSections(){
  var secs=['purchase-requests','purchase-orders','quotations','invoices','status','suppliers'];
  var delay=0;
  secs.forEach(function(sec){
    setTimeout(function(){
      if(!loaded[sec]){
        // Hanya load jika belum ada cache atau cache stale
        var cached=cacheGet(sec);
        if(!cached||cached._stale){
          try{
            google.script.run
              .withSuccessHandler(function(r){ _onServerData(sec,r); })
              .withFailureHandler(function(){})
              [_secFnMap[sec]]();
          }catch(e){}
        } else {
          // Ada cache fresh — pakai langsung
          store[sec]=cached.data;
          loaded[sec]=true;
          _arPrevCounts[sec]=(cached.data||[]).length;
        }
      }
    }, delay);
    delay+=300; // stagger 300ms antar request agar tidak flood GAS
  });
}

// ── Reload paksa (invalidate cache) ──────────────────────────────────────
function reloadSection(sec){
  cacheClear(sec);
  loaded[sec]=false;
  _loadingQueue[sec]=false;
  loadSection(sec);
}

// ── Refresh semua (tombol manual) ─────────────────────────────────────────
function refreshAll(){
  var ico=document.getElementById('ico-refresh-all');
  if(ico) ico.classList.add('fa-spin');
  var secs=['purchase-requests','purchase-orders','quotations','invoices','status','suppliers'];
  var done=0;
  secs.forEach(function(sec){
    cacheClear(sec);
    loaded[sec]=false;
    _loadingQueue[sec]=false;
    try{
      google.script.run
        .withSuccessHandler(function(r){
          _onServerData(sec,r);
          done++;
          if(done>=secs.length){
            if(ico) ico.classList.remove('fa-spin');
            showToast('Semua data berhasil diperbarui','success');
            if(currentSection==='dashboard') refreshDashboardCounts();
          }
        })
        .withFailureHandler(function(){
          done++;
          if(done>=secs.length&&ico) ico.classList.remove('fa-spin');
        })
        [_secFnMap[sec]]();
    }catch(e){ done++; if(done>=secs.length&&ico) ico.classList.remove('fa-spin'); }
  });
}

// ── Auto-refresh system ────────────────────────────────────────────────────
function startAutoRefresh(){
  if(_arTimer) clearInterval(_arTimer);
  _arCountdown=AUTO_REFRESH_INTERVAL;
  _arTimer=setInterval(function(){
    _arCountdown--;
    var txt=document.getElementById('refresh-timer-txt');
    if(txt) txt.textContent='Refresh: '+_arCountdown+'s';
    var bar=document.getElementById('refresh-bar');
    if(bar) bar.style.width=(((AUTO_REFRESH_INTERVAL-_arCountdown)/AUTO_REFRESH_INTERVAL)*100)+'%';
    if(_arCountdown<=0){
      _arCountdown=AUTO_REFRESH_INTERVAL;
      if(bar) bar.style.width='0%';
      _silentRefreshActive();
    }
  },1000);
}

// Hanya refresh seksi yang aktif + dashboard counts (lebih hemat)
function _silentRefreshActive(){
  var sec=currentSection;
  if(sec&&sec!=='dashboard'&&sec!=='account'&&sec!=='report'&&sec!=='extra'&&_secFnMap[sec]){
    if(_loadingQueue[sec]) return;
    _loadingQueue[sec]=true;
    try{
      google.script.run
        .withSuccessHandler(function(r){ _onServerData(sec,r); })
        .withFailureHandler(function(){ _loadingQueue[sec]=false; })
        [_secFnMap[sec]]();
    }catch(e){ _loadingQueue[sec]=false; }
  }
  // Update dashboard counts dari store yang ada (tanpa hit server)
  refreshDashboardCounts();
}

function silentRefreshAll(){
  var secs=['purchase-requests','purchase-orders','quotations','invoices','status','suppliers'];
  secs.forEach(function(sec){
    if(_loadingQueue[sec]) return;
    _loadingQueue[sec]=true;
    try{
      google.script.run
        .withSuccessHandler(function(r){ _onServerData(sec,r); })
        .withFailureHandler(function(){ _loadingQueue[sec]=false; })
        [_secFnMap[sec]]();
    }catch(e){ _loadingQueue[sec]=false; }
  });
}

}

// ── Activity Ticker ──────────────────────────────────────────────────────────
var activityLog = [];
var ACT_MAX = 50;

var ACT_CFG = {
  'purchase-requests': { icon:'fa-clipboard-list', color:'#f59e0b', label:'Purchase Request' },
  'purchase-orders':   { icon:'fa-shopping-cart',  color:'#8b5cf6', label:'Purchase Order'  },
  'quotations':        { icon:'fa-file-invoice',   color:'#0891b2', label:'Quotation'        },
  'invoices':          { icon:'fa-receipt',        color:'#16a34a', label:'Invoice'          }
};

function logActivity(action, sec, id, customer){
  var cfg = ACT_CFG[sec] || { icon:'fa-circle', color:'#64748b', label:sec };
  var now = new Date();
  var timeStr = now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  var entry = {
    action:   action,       // 'Tambah' | 'Edit' | 'Hapus'
    sec:      sec,
    id:       id   || '',
    customer: customer || '',
    label:    cfg.label,
    icon:     cfg.icon,
    color:    cfg.color,
    time:     timeStr
  };
  activityLog.unshift(entry);
  if(activityLog.length > ACT_MAX) activityLog.pop();
  try { localStorage.setItem('bms_activity_log', JSON.stringify(activityLog)); } catch(e){}
  loadNewsTicker();
  // Tambah ke notification panel juga
  addNotification(sec, action, id, customer, null);
}

function loadActivityLogFromStorage(){
  try {
    var saved = localStorage.getItem('bms_activity_log');
    if(saved) activityLog = JSON.parse(saved);
  } catch(e){ activityLog = []; }
}

function loadNewsTicker(){
  var inner = document.getElementById('ticker-inner');
  if(!inner) return;
  if(activityLog.length === 0){
    inner.innerHTML = '<span style="color:#475569;font-size:12px;padding:0 20px">Belum ada aktivitas tercatat. Mulai tambah data untuk melihat log di sini…</span>';
    return;
  }
  var html = activityLog.map(function(e){
    var actionColor = e.action==='Tambah'?'#4ade80': e.action==='Edit'?'#60a5fa':'#f87171';
    return '<span class="news-ticker-item">'
      + '<i class="fas '+e.icon+' act-icon" style="color:'+e.color+'"></i>'
      + '<span style="color:'+actionColor+';font-weight:700;font-size:10px">'+e.action+'</span>'
      + '<span>'+e.label+' &mdash; <strong>'+e.id+'</strong>'+(e.customer?' ('+e.customer+')':'')+'</span>'
      + '<span class="act-time">'+e.time+'</span>'
      + '</span><span class="sep">|</span>';
  }).join('');
  inner.innerHTML = html;
  var totalW = inner.scrollWidth;
  var speed = Math.max(20, totalW / 100);
  inner.style.animationDuration = speed + 's';
}
</script>
